backend:
  name: github
  repo: josejrdesigner-boop/ubs-maria-gloria
  branch: main

media_folder: "imagens"
public_folder: "/imagens"

locale: 'pt'

collections:
  - name: "apresentacao"
    label: "Apresentação UBS"
    files:

      - label: "01 · Capa"
        name: "capa"
        file: "conteudo/capa.json"
        fields:
          - { label: "Título linha 1", name: "titulo1", widget: "string", default: "UBS" }
          - { label: "Título linha 2 (itálico)", name: "titulo2", widget: "string", default: "Maria da Glória" }
          - { label: "Subtítulo", name: "subtitulo", widget: "string", default: "Unidade Básica de Saúde Porte IV · Bairro das Nações" }
          - { label: "Cidade / Estado", name: "cidade", widget: "string", default: "Balneário Camboriú · Santa Catarina" }

      - label: "02 · Contexto Urbano"
        name: "contexto"
        file: "conteudo/contexto.json"
        fields:
          - { label: "Título", name: "titulo", widget: "string", default: "O Bairro das Nações" }
          - { label: "Texto descritivo", name: "texto", widget: "text", default: "A UBS Maria da Glória representa um marco histórico..." }
          - { label: "Número de habitantes", name: "habitantes", widget: "string", default: "17.000+" }
          - { label: "Posição no ranking", name: "ranking", widget: "string", default: "2º" }
          - { label: "Legenda ranking", name: "ranking_label", widget: "string", default: "Maior bairro da cidade" }
          - { label: "Foto do bairro", name: "foto", widget: "image", required: false }

      - label: "03 · Conceito"
        name: "conceito"
        file: "conteudo/conceito.json"
        fields:
          - { label: "Frase principal", name: "frase", widget: "string", default: "Saúde acessível, próxima de quem mais precisa." }
          - { label: "Pilar 1 – Título", name: "pilar1_titulo", widget: "string", default: "Humanização" }
          - { label: "Pilar 1 – Descrição", name: "pilar1_desc", widget: "text" }
          - { label: "Pilar 2 – Título", name: "pilar2_titulo", widget: "string", default: "Acessibilidade" }
          - { label: "Pilar 2 – Descrição", name: "pilar2_desc", widget: "text" }
          - { label: "Pilar 3 – Título", name: "pilar3_titulo", widget: "string", default: "Eficiência" }
          - { label: "Pilar 3 – Descrição", name: "pilar3_desc", widget: "text" }

      - label: "04 · Capacidade"
        name: "capacidade"
        file: "conteudo/capacidade.json"
        fields:
          - { label: "Título", name: "titulo", widget: "string", default: "Alta Capacidade de Atendimento" }
          - { label: "Texto", name: "texto", widget: "text" }
          - { label: "Número equipes", name: "equipes", widget: "string", default: "4" }
          - { label: "Atendimentos / mês", name: "atendimentos", widget: "string", default: "5.000" }
          - { label: "Nota atendimentos", name: "atendimentos_nota", widget: "string", default: "Sem contar enfermagem, odontologia e ACS" }
          - { label: "Lugares auditório", name: "auditorio", widget: "string", default: "120" }

      - label: "05 · Implantação"
        name: "implantacao"
        file: "conteudo/implantacao.json"
        fields:
          - { label: "Área do terreno", name: "terreno", widget: "string", default: "1.400 m²" }
          - { label: "Vizinhança", name: "vizinhanca", widget: "string", default: "CEFIR + NAN" }
          - { label: "Descrição vizinhança", name: "vizinhanca_desc", widget: "string", default: "Polo integrado de equipamentos públicos" }
          - { label: "Área total construída", name: "area_total", widget: "string", default: "1.385,35 m²" }

      - label: "06 · Programa de Necessidades"
        name: "programa"
        file: "conteudo/programa.json"
        fields:
          - label: "Espaços"
            name: "espacos"
            widget: "list"
            fields:
              - { label: "Nome", name: "nome", widget: "string" }
              - { label: "Descrição", name: "desc", widget: "string" }
              - { label: "Número", name: "num", widget: "string", required: false }

      - label: "07 · Planta Térreo"
        name: "planta_terreo"
        file: "conteudo/planta_terreo.json"
        fields:
          - { label: "Área", name: "area", widget: "string", default: "875,01 m²" }
          - { label: "Ponto 1 – Título", name: "p1_titulo", widget: "string", default: "74 lugares de espera" }
          - { label: "Ponto 1 – Descrição", name: "p1_desc", widget: "string" }
          - { label: "Ponto 2 – Título", name: "p2_titulo", widget: "string", default: "Sala de Amamentação privativa" }
          - { label: "Ponto 2 – Descrição", name: "p2_desc", widget: "string" }
          - { label: "Ponto 3 – Título", name: "p3_titulo", widget: "string", default: "Sala Lilás" }
          - { label: "Ponto 3 – Descrição", name: "p3_desc", widget: "string" }
          - { label: "Ponto 4 – Título", name: "p4_titulo", widget: "string", default: "4 Consultórios acessíveis" }
          - { label: "Ponto 4 – Descrição", name: "p4_desc", widget: "string" }
          - { label: "Imagem da Planta", name: "imagem", widget: "image", required: false }

      - label: "08 · Planta Superior"
        name: "planta_superior"
        file: "conteudo/planta_superior.json"
        fields:
          - { label: "Área", name: "area", widget: "string", default: "436 m²" }
          - { label: "Destaque 1 – Título", name: "d1_titulo", widget: "string", default: "Auditório" }
          - { label: "Destaque 1 – Descrição", name: "d1_desc", widget: "string" }
          - { label: "Destaque 2 – Título", name: "d2_titulo", widget: "string", default: "Administrativo" }
          - { label: "Destaque 2 – Descrição", name: "d2_desc", widget: "string" }
          - { label: "Imagem da Planta", name: "imagem", widget: "image", required: false }

      - label: "09 · Galeria de Imagens"
        name: "galeria"
        file: "conteudo/galeria.json"
        fields:
          - label: "Imagens"
            name: "imagens"
            widget: "list"
            fields:
              - { label: "Legenda", name: "legenda", widget: "string" }
              - { label: "Imagem", name: "imagem", widget: "image" }

      - label: "10 · Vídeo"
        name: "video"
        file: "conteudo/video.json"
        fields:
          - { label: "URL do Vídeo (YouTube embed)", name: "url", widget: "string", default: "https://www.youtube.com/embed/t6CBL5QvykI?rel=0" }
          - { label: "Título", name: "titulo", widget: "string", default: "Vídeo do Projeto" }

      - label: "11 · Diferenciais"
        name: "diferenciais"
        file: "conteudo/diferenciais.json"
        fields:
          - { label: "Diferencial 1 – Título", name: "d1_titulo", widget: "string", default: "Acessibilidade Total" }
          - { label: "Diferencial 1 – Descrição", name: "d1_desc", widget: "text" }
          - { label: "Diferencial 2 – Título", name: "d2_titulo", widget: "string", default: "Eficiência Operacional" }
          - { label: "Diferencial 2 – Descrição", name: "d2_desc", widget: "text" }
          - { label: "Diferencial 3 – Título", name: "d3_titulo", widget: "string", default: "Escala de Atendimento" }
          - { label: "Diferencial 3 – Descrição", name: "d3_desc", widget: "text" }
          - { label: "Diferencial 4 – Título", name: "d4_titulo", widget: "string", default: "Integração Urbana" }
          - { label: "Diferencial 4 – Descrição", name: "d4_desc", widget: "text" }

      - label: "12 · Equipe"
        name: "equipe"
        file: "conteudo/equipe.json"
        fields:
          - { label: "Título da seção", name: "titulo_secao", widget: "string", default: "Equipe de Engenharia AMFRI" }
          - label: "Membros"
            name: "membros"
            widget: "list"
            fields:
              - { label: "Nome", name: "nome", widget: "string" }
              - { label: "Cargo", name: "cargo", widget: "string" }
          - { label: "Texto institucional", name: "texto", widget: "text" }
